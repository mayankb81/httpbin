apiVersion: v1
kind: ConfigMap
metadata:
  name: httpbin-audit-config
  labels:
    app: httpbin
data:
  AUDIT_DB_HOST: {{ .Values.audit.db.host | quote }}
  AUDIT_DB_PORT: {{ .Values.audit.db.port | quote }}
  AUDIT_DB_NAME: {{ .Values.audit.db.name | quote }}
  AUDIT_RETENTION_DAYS: {{ .Values.audit.retentionDays | quote }}
