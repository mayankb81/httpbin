image: <+artifacts.primary.image>

replicaCount: 2

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

config:
  AUDIT_DB_PORT: "3306"
  AUDIT_DB_NAME: "httpbin_audit"
  AUDIT_RETENTION_DAYS: "30"

secrets:
  AUDIT_DB_HOST: "mysql"
  AUDIT_DB_USER: "httpbin"
  AUDIT_DB_PASSWORD: "httpbin"