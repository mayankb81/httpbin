apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  labels:
    app: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
      - name: httpbin
        image: {{ .Values.image }}
        ports:
        - containerPort: 80
        env:
        - name: AUDIT_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: httpbin-config
              key: AUDIT_DB_HOST
        - name: AUDIT_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: httpbin-config
              key: AUDIT_DB_PORT
        - name: AUDIT_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: httpbin-config
              key: AUDIT_DB_NAME
        - name: AUDIT_RETENTION_DAYS
          valueFrom:
            configMapKeyRef:
              name: httpbin-config
              key: AUDIT_RETENTION_DAYS
        - name: AUDIT_DB_USER
          valueFrom:
            secretKeyRef:
              name: httpbin-secret
              key: AUDIT_DB_USER
        - name: AUDIT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: httpbin-secret
              key: AUDIT_DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /status
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"