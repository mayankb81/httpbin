apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-service
  labels:
    app: httpbin-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpbin-service
  template:
    metadata:
      labels:
        app: httpbin-service
    spec:
      containers:
      - name: httpbin-service
        image: '{{ .Values.image }}'
        ports:
        - containerPort: 80
        env:
        - name: AUDIT_DB_HOST
          valueFrom:
            secretKeyRef:
              name: httpbin-service-secrets
              key: AUDIT_DB_HOST
        - name: AUDIT_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: httpbin-service-config
              key: AUDIT_DB_PORT
        - name: AUDIT_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: httpbin-service-config
              key: AUDIT_DB_NAME
        - name: AUDIT_DB_USER
          valueFrom:
            secretKeyRef:
              name: httpbin-service-secrets
              key: AUDIT_DB_USER
        - name: AUDIT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: httpbin-service-secrets
              key: AUDIT_DB_PASSWORD
        - name: AUDIT_RETENTION_DAYS
          valueFrom:
            configMapKeyRef:
              name: httpbin-service-config
              key: AUDIT_RETENTION_DAYS
        livenessProbe:
          httpGet:
            path: /get
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /get
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"