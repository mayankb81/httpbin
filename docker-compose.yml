services:
    httpbin:
      build: '.'
      ports:
        - '8090:80'
      environment:
        AUDIT_DB_HOST: '${AUDIT_DB_HOST}'
        AUDIT_DB_PORT: '${AUDIT_DB_PORT:-3306}'
        AUDIT_DB_NAME: '${AUDIT_DB_NAME:-httpbin_audit}'
        AUDIT_DB_USER: '${AUDIT_DB_USER}'
        AUDIT_DB_PASSWORD: '${AUDIT_DB_PASSWORD}'
        AUDIT_RETENTION_DAYS: '${AUDIT_RETENTION_DAYS:-30}'
      depends_on:
        mysql:
          condition: service_healthy

    mysql:
      image: mysql:8.0
      ports:
        - '3306:3306'
      environment:
        MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root}'
        MYSQL_DATABASE: '${MYSQL_DATABASE:-httpbin_audit}'
        MYSQL_USER: '${MYSQL_USER:-httpbin}'
        MYSQL_PASSWORD: '${MYSQL_PASSWORD:-httpbin}'
      healthcheck:
        test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${MYSQL_ROOT_PASSWORD:-root}']
        interval: 5s
        timeout: 5s
        retries: 20
